services:
  # Base de données PostgreSQL
  - type: database
    name: momentarise-db
    plan: free
    databaseName: momentarise
    user: momentarise

  # Service API FastAPI
  - type: web
    name: momentarise-api
    env: docker
    plan: free
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: momentarise-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: http://localhost:3000,https://momentarise.vercel.app
      - key: CAPTURE_ASYNC_WORKER_ENABLED
        value: "false"
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: momentarise-redis
          property: connectionString
      - key: CELERY_TASK_MAX_RETRIES
        value: "3"
      - key: CELERY_TASK_SOFT_TIME_LIMIT_SECONDS
        value: "780"
      - key: CELERY_TASK_TIME_LIMIT_SECONDS
        value: "900"
      - key: CELERY_WORKER_PREFETCH_MULTIPLIER
        value: "1"
      - key: SYNC_LLM_PROVIDER
        value: mistral
      - key: MISTRAL_API_KEY
        sync: false # À saisir manuellement dans le dashboard Render
      - key: PORT
        value: 10000

  - type: redis
    name: momentarise-redis
    ipAllowList: []
    plan: free
    maxmemoryPolicy: noeviction

  - type: worker
    name: momentarise-api-worker
    env: docker
    plan: free
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    dockerCommand: uv run celery -A src.worker.celery_app:celery_app worker -Q capture_high,capture_default,capture_free --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: momentarise-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CAPTURE_ASYNC_WORKER_ENABLED
        value: "true"
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: momentarise-redis
          property: connectionString
      - key: CELERY_TASK_MAX_RETRIES
        value: "3"
      - key: CELERY_TASK_SOFT_TIME_LIMIT_SECONDS
        value: "780"
      - key: CELERY_TASK_TIME_LIMIT_SECONDS
        value: "900"
      - key: CELERY_WORKER_PREFETCH_MULTIPLIER
        value: "1"
