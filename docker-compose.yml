services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: momentarise
      POSTGRES_PASSWORD: momentarise_dev
      POSTGRES_DB: momentarise_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
