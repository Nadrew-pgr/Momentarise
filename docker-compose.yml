services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: momentarise
      POSTGRES_PASSWORD: momentarise_dev
      POSTGRES_DB: momentarise_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://momentarise:momentarise_dev@db:5432/momentarise_dev
      JWT_SECRET: dev-secret
      CORS_ORIGINS: http://localhost:3000
      CAPTURE_ASYNC_WORKER_ENABLED: "true"
      CELERY_BROKER_URL: redis://redis:6379/0
      PORT: "8000"
  api-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://momentarise:momentarise_dev@db:5432/momentarise_dev
      JWT_SECRET: dev-secret
      CAPTURE_ASYNC_WORKER_ENABLED: "true"
      CELERY_BROKER_URL: redis://redis:6379/0
    command: >
      sh -c "uv run celery -A src.worker.celery_app:celery_app worker
      -Q capture_high,capture_default,capture_free --loglevel=info
      --concurrency=2"

volumes:
  pgdata:
